<!-- @startingPoint section="Screens" subtitle="BullRun hub scene — clickable room of portals" viewport="1376x768" -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BullRun — La tua cameretta</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    html, body { margin: 0; height: 100%; background: #06080d; }
    a { color: inherit; text-decoration: none; }
    [data-lucide] { width: 18px; height: 18px; stroke-width: 2; }

    .hub-bg {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(37,228,212,0.10), transparent 70%),
        radial-gradient(700px 500px at 0% 110%, rgba(182,242,60,0.08), transparent 70%),
        #06080d;
      padding: 0;
    }
    /* 16:9 stage that fits the viewport, keeps hotspot alignment */
    .stage {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      overflow: hidden;
    }
    .scene { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vignette {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 40%, transparent 55%, rgba(4,6,12,0.55) 100%),
        linear-gradient(180deg, rgba(4,6,12,0.45) 0%, transparent 22%, transparent 60%, rgba(4,6,12,0.7) 100%);
    }

    /* ---- HUD ---- */
    .hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 16px 22px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { height: 34px; filter: drop-shadow(0 0 10px rgba(37,228,212,0.4)); }
    .brand span { font-family: var(--font-display); font-weight: 700; font-size: 19px; letter-spacing: -0.02em; color: var(--br-text); }
    .brand .g { background: var(--br-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hud-hint {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: var(--radius-pill);
      background: var(--glass-bg); backdrop-filter: blur(var(--blur-panel));
      border: 1px solid var(--br-line-strong);
      font-size: 13px; color: var(--br-text-muted); white-space: nowrap;
    }
    .hud-hint [data-lucide] { width: 15px; height: 15px; color: var(--br-teal); }
    .hud-hint .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--br-teal); box-shadow: 0 0 10px var(--br-teal); animation: blink 1.6s var(--ease-in-out) infinite; }
    .hud-right { display: flex; align-items: center; gap: 12px; }
    .cash {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: var(--radius-pill);
      background: var(--glass-bg); backdrop-filter: blur(var(--blur-panel));
      border: 1px solid var(--br-line-strong);
      font-family: var(--font-mono); font-size: 13px; color: var(--br-text);
    }
    .cash [data-lucide] { width: 15px; height: 15px; color: var(--br-cash); }

    /* ---- Hotspots ---- */
    .hot { position: absolute; z-index: 15; display: block; }
    .hot .ring {
      position: absolute; inset: -6px; border-radius: 18px;
      border: 1.5px solid transparent;
      transition: border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out), background var(--dur-base) var(--ease-out);
    }
    .hot:hover .ring {
      border-color: var(--acc);
      background: radial-gradient(120% 120% at 50% 50%, color-mix(in oklab, var(--acc) 14%, transparent), transparent 70%);
      box-shadow: 0 0 0 1px var(--acc), 0 0 30px -2px var(--acc), inset 0 0 40px -14px var(--acc);
    }
    .hot .ping {
      position: absolute; top: 8px; right: 8px; width: 9px; height: 9px; border-radius: 50%;
      background: var(--acc); box-shadow: 0 0 12px var(--acc);
      animation: blink 1.8s var(--ease-in-out) infinite;
    }
    .hot:hover .ping { opacity: 0; }
    .pill {
      position: absolute; left: 50%; top: calc(100% - 2px);
      transform: translate(-50%, 6px);
      display: inline-flex; align-items: center; gap: 10px;
      padding: 8px 12px; white-space: nowrap;
      border-radius: 14px;
      background: var(--glass-bg); backdrop-filter: blur(var(--blur-panel));
      border: 1px solid color-mix(in oklab, var(--acc) 45%, var(--br-line));
      box-shadow: var(--shadow-md);
      opacity: 0.92;
      transition: transform var(--dur-base) var(--ease-out), opacity var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
    }
    .hot:hover .pill { transform: translate(-50%, 0); opacity: 1; box-shadow: var(--shadow-lg), 0 0 24px -6px var(--acc); }
    .pill.up { top: auto; bottom: calc(100% - 2px); transform: translate(-50%, -6px); }
    .hot:hover .pill.up { transform: translate(-50%, 0); }
    .pill-ic {
      width: 30px; height: 30px; flex: none; border-radius: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      background: color-mix(in oklab, var(--acc) 18%, transparent); color: var(--acc);
    }
    .pill-ic [data-lucide] { width: 17px; height: 17px; }
    .pill-txt { display: flex; flex-direction: column; line-height: 1.15; }
    .pill-txt b { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--br-text); }
    .pill-txt i { font-family: var(--font-mono); font-style: normal; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--acc); }
    .pill-go { color: var(--br-text-dim); display: inline-flex; }
    .pill-go [data-lucide] { width: 15px; height: 15px; }
    .pill-primary { padding: 10px 14px; box-shadow: var(--shadow-md), 0 0 22px -6px var(--acc); }
    .pill-primary .pill-txt b { font-size: 15px; }

    /* ---- Caption ---- */
    .caption { position: absolute; left: 24px; bottom: 22px; z-index: 18; max-width: 460px; }
    .caption h1 { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 30px; letter-spacing: -0.02em; color: var(--br-text); text-shadow: 0 2px 18px rgba(0,0,0,0.6); }
    .caption p { margin: 6px 0 0; font-size: 14px; line-height: 1.55; color: var(--br-text-muted); text-shadow: 0 2px 12px rgba(0,0,0,0.7); }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    @media (prefers-reduced-motion: reduce) { .ping, .dot { animation: none; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="Hub.jsx"></script>
</body>
</html>
