<!-- @dsCard group="Brand" viewport="700x180" name="Signature gradient" subtitle="Lime → cyan, the bull's body" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:0;font-family:var(--font-mono)}
  .wrap{display:flex;flex-direction:column}
  .band{height:60px;display:flex;align-items:flex-end;padding:10px 16px;color:var(--br-ink);font-size:11px;font-weight:600}
  .info{padding:14px 16px;display:flex;justify-content:space-between;color:var(--br-text-dim);font-size:11px}
  .gt{font-family:var(--font-display);font-weight:700;font-size:26px;background:var(--br-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head>
<body>
  <div class="wrap">
    <div class="band" style="background:var(--br-gradient)">--br-gradient · 135°</div>
    <div class="band" style="background:var(--br-gradient-tri)">--br-gradient-tri · lime → cyan → lavender</div>
    <div class="info"><span class="gt">BullRun</span><span>.br-gradient-text utility</span></div>
  </div>
</body></html>
