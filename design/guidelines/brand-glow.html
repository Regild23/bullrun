<!-- @dsCard group="Brand" viewport="700x180" name="Neon glow system" subtitle="The signature effect — used on focus / active" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:26px;font-family:var(--font-mono)}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .c{display:flex;flex-direction:column;gap:12px;align-items:center}
  .box{width:120px;height:64px;border-radius:var(--radius-md);background:var(--br-surface)}
  .l{font-size:10px;color:var(--br-text-dim)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="box-shadow:var(--glow-green)"></div><span class="l">--glow-green</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--glow-teal)"></div><span class="l">--glow-teal</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--glow-purple)"></div><span class="l">--glow-purple</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--glow-soft-teal)"></div><span class="l">--glow-soft-teal</span></div>
  </div>
</body></html>
