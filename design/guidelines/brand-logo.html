<!-- @dsCard group="Brand" viewport="700x240" name="Logo" subtitle="Neon bull mascot on dark canvas" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:0;font-family:var(--font-display)}
  .wrap{display:flex;align-items:center;gap:28px;padding:24px 30px}
  .lock{display:flex;align-items:center;gap:16px}
  .mark{height:120px;filter:drop-shadow(0 0 22px rgba(37,228,212,.3))}
  .word{font-weight:700;font-size:40px;letter-spacing:-.02em}
  .b1{background:var(--br-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
  .note{font-family:var(--font-mono);font-size:11px;color:var(--br-text-dim);margin-top:8px}
</style></head>
<body>
  <div class="wrap">
    <img class="mark" src="../assets/bullrun-logo-transparent.png" alt="BullRun">
    <div>
      <div class="word"><span class="b1">Bull</span><span style="color:var(--br-text)">Run</span></div>
      <div class="note">Mascotte sempre su fondo scuro · alone neon preservato</div>
    </div>
  </div>
</body></html>
