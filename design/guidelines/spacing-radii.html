<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Rounded & friendly" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:22px;font-family:var(--font-mono)}
  .row{display:flex;gap:16px;align-items:center}
  .c{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:72px;height:72px;background:var(--br-surface-2);border:1px solid var(--br-line-strong)}
  .l{font-size:10px;color:var(--br-text-dim)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="border-radius:6px"></div><span class="l">xs · 6</span></div>
    <div class="c"><div class="box" style="border-radius:10px"></div><span class="l">sm · 10</span></div>
    <div class="c"><div class="box" style="border-radius:14px"></div><span class="l">md · 14</span></div>
    <div class="c"><div class="box" style="border-radius:20px"></div><span class="l">lg · 20</span></div>
    <div class="c"><div class="box" style="border-radius:28px"></div><span class="l">xl · 28</span></div>
    <div class="c"><div class="box" style="border-radius:999px"></div><span class="l">pill</span></div>
  </div>
</body></html>
