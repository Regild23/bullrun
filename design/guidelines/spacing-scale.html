<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:22px;font-family:var(--font-mono)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .c{display:flex;flex-direction:column;gap:8px;align-items:center}
  .bar{background:var(--br-gradient);border-radius:4px;width:20px}
  .l{font-size:10px;color:var(--br-text-dim)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="bar" style="height:4px"></div><span class="l">1·4</span></div>
    <div class="c"><div class="bar" style="height:8px"></div><span class="l">2·8</span></div>
    <div class="c"><div class="bar" style="height:12px"></div><span class="l">3·12</span></div>
    <div class="c"><div class="bar" style="height:16px"></div><span class="l">4·16</span></div>
    <div class="c"><div class="bar" style="height:24px"></div><span class="l">6·24</span></div>
    <div class="c"><div class="bar" style="height:32px"></div><span class="l">8·32</span></div>
    <div class="c"><div class="bar" style="height:48px"></div><span class="l">12·48</span></div>
    <div class="c"><div class="bar" style="height:64px"></div><span class="l">16·64</span></div>
    <div class="c"><div class="bar" style="height:80px"></div><span class="l">20·80</span></div>
  </div>
</body></html>
