<!-- @dsCard group="Colors" viewport="700x150" name="Brand neons" subtitle="Lime → cyan → lavender, drawn from the bull mascot" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:20px;font-family:var(--font-body)}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;border:1px solid var(--br-line)}
  .name{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--br-ink)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--br-ink);opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--br-green);box-shadow:var(--glow-soft-green)"><span class="name">Lime</span><span class="hex">#B6F23C · --br-green</span></div>
    <div class="sw" style="background:var(--br-teal);box-shadow:var(--glow-soft-teal)"><span class="name">Cyan</span><span class="hex">#25E4D4 · --br-teal</span></div>
    <div class="sw" style="background:var(--br-purple)"><span class="name">Lavender</span><span class="hex">#C7A1F5 · --br-purple</span></div>
  </div>
</body></html>
