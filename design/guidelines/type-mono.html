<!-- @dsCard group="Type" viewport="700x160" name="Mono — JetBrains Mono" subtitle="Prices, tickers, tabular data" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:22px;font-family:var(--font-mono);color:var(--br-text)}
  .num{font-size:44px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .row{display:flex;gap:22px;align-items:baseline;margin-top:14px;flex-wrap:wrap}
  .tick{font-size:14px;color:var(--br-text-muted)}
  .up{color:var(--br-up)} .down{color:var(--br-down)}
  .meta{font-size:11px;color:var(--br-text-dim);margin-top:14px}
</style></head>
<body>
  <div class="num">€ 12.480,50</div>
  <div class="row">
    <span class="tick">BTC <span class="up">▴ +6.4%</span></span>
    <span class="tick">ETF <span class="up">▴ +1.2%</span></span>
    <span class="tick">AZ <span class="down">▾ -2.8%</span></span>
    <span class="tick">0123456789</span>
  </div>
  <div class="meta">JetBrains Mono · tabular-nums · --font-mono</div>
</body></html>
