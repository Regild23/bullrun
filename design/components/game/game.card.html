<!-- @dsCard group="Components" viewport="700x440" name="Game" subtitle="AssetModule · EventPanel · Sparkline · ProgressBar" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--br-bg);padding:24px;font-family:var(--font-body)}
  .h{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--br-text-dim);margin:0 0 12px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
  .two{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:start}
  [data-lucide]{width:20px;height:20px}
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.BullRunDesignSystem_5f2728;
    const { AssetModule, EventPanel, Sparkline, ProgressBar, Card } = NS;
    const I = (n) => <i data-lucide={n}></i>;
    function Demo(){
      const [sel,setSel] = React.useState('crypto');
      React.useEffect(()=>{ window.lucide && lucide.createIcons(); });
      return (
        <div>
          <div className="h">AssetModule — clicca per selezionare</div>
          <div className="grid">
            <AssetModule name="ETF" accent="var(--br-etf)" value="€ 3.400" delta="+1.2%" allocation={27} icon={I('layers')} selected={sel==='etf'} onClick={()=>setSel('etf')}/>
            <AssetModule name="Crypto" accent="var(--br-crypto)" value="€ 2.150" delta="+6.4%" allocation={18} icon={I('bitcoin')} selected={sel==='crypto'} onClick={()=>setSel('crypto')}/>
            <AssetModule name="Azioni" accent="var(--br-stock)" value="€ 1.980" delta="-2.8%" allocation={16} icon={I('trending-up')} selected={sel==='stock'} onClick={()=>setSel('stock')}/>
          </div>
          <div className="two">
            <EventPanel title="La BCE alza i tassi di interesse" icon={I('newspaper')}
              body="Prendere prestiti costa di più: le aziende rallentano e le obbligazioni diventano più interessanti."
              impacts={[{label:'BTP',delta:'+3%'},{label:'Azioni',delta:'-5%',dir:'down'},{label:'Crypto',delta:'-7%',dir:'down'}]}/>
            <Card style={{padding:16}}>
              <div className="h" style={{margin:'0 0 10px'}}>Sparkline + XP</div>
              <Sparkline data={[100,112,108,124,120,138,132,150,162]} height={90} showDots/>
              <div style={{marginTop:16}}><ProgressBar label="Livello 7" valueText="740 / 1000 XP" value={74}/></div>
            </Card>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>
