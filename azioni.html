<!DOCTYPE html>
<!--
  ============================================================
  BullRun · Azioni (la Borsa)
  ============================================================
  La prima delle "stanze" dedicate a un singolo asset: qui puoi
  comprare azioni di 40 aziende VERE (prezzi veri, aggiornati ogni ora
  da api/prezzi.js) e vendere quelle che possiedi. La liquidità è
  sempre ben visibile, così sai sempre quanto puoi spendere.
-->
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BullRun · Azioni</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/site.css">
  <style>
    .az-wrap { min-height: 100vh; display: flex; flex-direction: column; }

    /* Barra in alto: si torna alla cameretta, o si va al profilo */
    .topbar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between;
      padding: 12px 32px; background: rgba(10,14,20,0.78); backdrop-filter: blur(16px); border-bottom: 1px solid var(--br-line); }
    .topbar__brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .topbar__brand img { height: 36px; filter: drop-shadow(0 0 10px rgba(37,228,212,0.35)); }
    .topbar__name { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; color: var(--br-text); }
    .topbar__right { display: flex; align-items: center; gap: 12px; }
    .cash-pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius-pill);
      background: var(--br-surface-2); border: 1px solid var(--br-line-neon); font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--br-text); }
    .cash-pill svg.lucide { width: 16px; height: 16px; color: var(--br-cash); }
    .icon-btn { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-md);
      background: var(--br-surface-2); border: 1px solid var(--br-line); color: var(--br-text-muted); cursor: pointer; transition: .2s; text-decoration: none; }
    .icon-btn:hover { color: var(--br-text); border-color: var(--br-line-strong); }
    .icon-btn svg.lucide { width: 18px; height: 18px; }

    .az-main { flex: 1; max-width: 1180px; width: 100%; margin: 0 auto; padding: 26px 32px 60px; display: flex; flex-direction: column; gap: 30px; }

    /* Liquidità in grande evidenza */
    .liquidita-hero { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 18px;
      padding: 26px 28px; }
    .liquidita-hero__ic { width: 54px; height: 54px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      background: var(--br-gradient); color: var(--br-ink); flex: none; }
    .liquidita-hero__ic svg.lucide { width: 26px; height: 26px; }
    .liquidita-hero__val { font-family: var(--font-mono); font-weight: 800; font-size: 40px; color: var(--br-text); text-shadow: var(--glow-text-green); line-height: 1; }
    .liquidita-hero__lab { font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--br-text-dim); margin-bottom: 6px; }
    .liquidita-hero__nota { font-size: 13px; color: var(--br-text-muted); max-width: 260px; text-align: right; }

    .sez__head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
    .sez__head h2 { margin: 0; font-family: var(--font-display); font-size: 21px; font-weight: 700; color: var(--br-text); }
    .sez__head span { font-size: 13px; color: var(--br-text-dim); }

    /* Portafoglio azioni possedute */
    .holding-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .holding { --acc: var(--br-stock); background: var(--br-surface); border: 1px solid var(--acc); border-radius: var(--radius-lg);
      padding: 18px; box-shadow: 0 0 0 1px var(--acc), 0 0 22px -8px var(--acc); }
    .holding__top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .holding__ic { width: 34px; height: 34px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
      background: var(--acc); color: var(--br-ink); flex: none; }
    .holding__ic svg.lucide { width: 18px; height: 18px; }
    .holding__nome { font-family: var(--font-display); font-weight: 600; font-size: 14.5px; color: var(--br-text); }
    .holding__tick { font-family: var(--font-mono); font-size: 11px; color: var(--br-text-dim); }
    .holding__val { font-family: var(--font-mono); font-weight: 700; font-size: 19px; color: var(--br-text); }
    .holding__delta { font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; margin-top: 2px; }
    .holding__delta--up { color: var(--br-up); } .holding__delta--down { color: var(--br-down); }
    .holding .btn { width: 100%; margin-top: 14px; }
    .holding-empty { grid-column: 1/-1; text-align: center; padding: 30px 16px; color: var(--br-text-dim); font-size: 13.5px;
      background: var(--br-surface); border: 1px dashed var(--br-line); border-radius: var(--radius-lg); }

    /* Mercato: aziende disponibili */
    .market-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .market { --acc: var(--br-stock); background: var(--br-surface); border: 1px solid var(--br-line); border-radius: var(--radius-lg);
      padding: 16px; cursor: pointer; transition: transform var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out); }
    .market:hover { transform: translateY(-3px); border-color: var(--br-line-strong); }
    .market__top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .market__ic { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.05); color: var(--acc); }
    .market__ic svg.lucide { width: 17px; height: 17px; }
    .market__delta { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
    .market__delta--up { color: var(--br-up); } .market__delta--down { color: var(--br-down); }
    .market__nome { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--br-text); }
    .market__tick { font-family: var(--font-mono); font-size: 10.5px; color: var(--br-text-dim); margin-bottom: 6px; }
    .market__prezzo { font-family: var(--font-mono); font-weight: 700; font-size: 16px; color: var(--br-text); margin-bottom: 10px; }
    .market .btn { width: 100%; }

    /* Pannello di dettaglio: grafico + scheda azienda, aperto cliccando una card */
    .market-modal { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center;
      background: rgba(6,8,13,.75); backdrop-filter: blur(6px); padding: 20px; }
    .market-modal.on { display: flex; }
    .market-modal__panel { position: relative; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
      background: var(--br-surface); border: 1px solid var(--br-line-strong); border-radius: var(--radius-xl);
      padding: 30px 28px 28px; box-shadow: var(--shadow-lg); }
    .market-modal__close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%;
      background: var(--br-surface-2); border: 1px solid var(--br-line); color: var(--br-text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; }
    .market-modal__close svg.lucide { width: 17px; height: 17px; }
    .market-modal__head { display: flex; align-items: center; gap: 12px; margin: 4px 34px 18px 0; }
    .market-modal__ic { width: 42px; height: 42px; border-radius: var(--radius-sm); display: flex; align-items: center;
      justify-content: center; background: rgba(255,255,255,.05); color: var(--br-stock); flex: none; }
    .market-modal__ic svg.lucide { width: 21px; height: 21px; }
    .market-modal__head h3 { margin: 0; font-family: var(--font-display); font-size: 19px; color: var(--br-text); }
    .market-modal__tick { font-family: var(--font-mono); font-size: 11.5px; color: var(--br-text-dim); }
    .market-modal__prezzo { margin-left: auto; font-family: var(--font-mono); font-weight: 700; font-size: 20px; color: var(--br-text); }
    .market-modal__chart { height: 300px; margin-bottom: 18px; border-radius: var(--radius-md); overflow: hidden; background: var(--br-surface-2); }
    .mm-scheda { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
    .mm-riga { display: flex; justify-content: space-between; gap: 14px; font-size: 13.5px; }
    .mm-riga span { color: var(--br-text-dim); }
    .mm-riga b { color: var(--br-text); font-weight: 600; text-align: right; }
    .mm-curiosita { font-size: 13px; color: var(--br-text-muted); line-height: 1.5; padding-top: 12px; border-top: 1px solid var(--br-line); margin-bottom: 20px; }

    @media (max-width: 920px) { .holding-grid { grid-template-columns: 1fr 1fr; } .market-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) {
      .holding-grid, .market-grid { grid-template-columns: 1fr; }
      .topbar { padding: 12px 16px; } .az-main { padding: 22px 16px 50px; }
      .liquidita-hero { flex-direction: column; align-items: flex-start; }
      .liquidita-hero__nota { text-align: left; }
      .market-modal__chart { height: 220px; }
      .market-modal__head { flex-wrap: wrap; }
      .market-modal__prezzo { margin-left: 54px; width: 100%; text-align: left; font-size: 17px; }
    }
  </style>
</head>
<body class="br-grid-bg">
  <div class="az-wrap">

    <!-- BARRA IN ALTO -->
    <header class="topbar">
      <a class="topbar__brand" href="hub.html">
        <img src="assets/logo.png" alt="">
        <span class="topbar__name"><span class="br-gradient-text">Bull</span>Run</span>
      </a>
      <div class="topbar__right">
        <span class="cash-pill"><i data-lucide="wallet"></i><span id="tb-cash">€ 0</span></span>
        <a class="icon-btn" href="hub.html" title="Torna alla cameretta"><i data-lucide="door-open"></i></a>
        <a class="icon-btn" href="profile.html" title="Il tuo profilo"><i data-lucide="user"></i></a>
      </div>
    </header>

    <!-- TICKER: le aziende che scorrono, come in home -->
    <div class="ticker" aria-hidden="true">
      <div class="ticker__track" id="ticker-track"></div>
    </div>

    <main class="az-main">

      <!-- Liquidità sempre in evidenza -->
      <div class="card liquidita-hero">
        <div style="display:flex; align-items:center; gap:16px;">
          <span class="liquidita-hero__ic"><i data-lucide="wallet"></i></span>
          <div>
            <div class="liquidita-hero__lab">Liquidità disponibile</div>
            <div class="liquidita-hero__val" id="liquidita-val">€ 0</div>
          </div>
        </div>
        <p class="liquidita-hero__nota">Quello che non hai investito. Ogni acquisto la riduce, ogni vendita la aumenta.</p>
      </div>

      <!-- Il tuo portafoglio azioni -->
      <section>
        <div class="sez__head">
          <h2>Il tuo portafoglio azioni</h2>
          <span>Vendi con un click</span>
        </div>
        <div class="holding-grid" id="holding-grid"></div>
      </section>

      <!-- Mercato azionario -->
      <section>
        <div class="sez__head">
          <h2>Mercato azionario</h2>
          <span>Aziende disponibili per investire</span>
        </div>
        <div class="market-grid" id="market-grid"></div>
      </section>

    </main>
  </div>

  <!-- Pannello di dettaglio: grafico + scheda azienda -->
  <div class="market-modal" id="market-modal">
    <div class="market-modal__panel">
      <button class="market-modal__close" id="mm-chiudi" aria-label="Chiudi"><i data-lucide="x"></i></button>
      <div class="market-modal__head">
        <span class="market-modal__ic" id="mm-ic"><i data-lucide="circle"></i></span>
        <div>
          <h3 id="mm-nome">—</h3>
          <div class="market-modal__tick" id="mm-tick">—</div>
        </div>
        <div class="market-modal__prezzo" id="mm-prezzo">—</div>
      </div>
      <div class="market-modal__chart" id="tv-grafico"></div>
      <div class="mm-scheda" id="mm-scheda"></div>
      <p class="mm-curiosita" id="mm-curiosita"></p>
      <button class="btn btn--primary btn--lg" id="mm-compra" style="width:100%;">Compra</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/stato-gioco.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const formattaNumero = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    const eur = n => '€ ' + formattaNumero(n);

    // ====== Le aziende del mercato (40 aziende VERE) ======
    // "id" è il ticker vero, lo stesso usato in api/prezzi.js: è la
    // chiave con cui cerchiamo il prezzo di ognuna nella mappa prezzi.
    // "borsa" è il mercato dove è quotato il titolo, serve al grafico
    // TradingView più sotto (vuole "borsa:ticker", es. "NASDAQ:AAPL").
    const AZIENDE = [
      { id:'AAPL', nome:'Apple',            icona:'smartphone',   borsa:'NASDAQ' },
      { id:'MSFT', nome:'Microsoft',        icona:'monitor',      borsa:'NASDAQ' },
      { id:'GOOGL',nome:'Alphabet (Google)',icona:'search',       borsa:'NASDAQ' },
      { id:'AMZN', nome:'Amazon',           icona:'package',      borsa:'NASDAQ' },
      { id:'TSLA', nome:'Tesla',            icona:'car',          borsa:'NASDAQ' },
      { id:'NVDA', nome:'Nvidia',           icona:'cpu',          borsa:'NASDAQ' },
      { id:'META', nome:'Meta',             icona:'users',        borsa:'NASDAQ' },
      { id:'NFLX', nome:'Netflix',          icona:'clapperboard', borsa:'NASDAQ' },
      { id:'DIS',  nome:'Disney',           icona:'sparkles',     borsa:'NYSE' },
      { id:'NKE',  nome:'Nike',             icona:'footprints',   borsa:'NYSE' },
      { id:'MCD',  nome:"McDonald's",       icona:'utensils',     borsa:'NYSE' },
      { id:'KO',   nome:'Coca-Cola',        icona:'cup-soda',     borsa:'NYSE' },
      { id:'SBUX', nome:'Starbucks',        icona:'coffee',       borsa:'NASDAQ' },
      { id:'PYPL', nome:'PayPal',           icona:'credit-card',  borsa:'NASDAQ' },
      { id:'V',    nome:'Visa',             icona:'credit-card',  borsa:'NYSE' },
      { id:'ADBE', nome:'Adobe',            icona:'palette',      borsa:'NASDAQ' },
      { id:'SPOT', nome:'Spotify',          icona:'music',        borsa:'NYSE' },
      { id:'ABNB', nome:'Airbnb',           icona:'home',         borsa:'NASDAQ' },
      { id:'UBER', nome:'Uber',             icona:'map-pin',      borsa:'NYSE' },
      { id:'PEP',  nome:'PepsiCo',          icona:'cup-soda',     borsa:'NASDAQ' },
      { id:'MA',   nome:'Mastercard',       icona:'credit-card',  borsa:'NYSE' },
      { id:'INTC', nome:'Intel',            icona:'cpu',          borsa:'NASDAQ' },
      { id:'AMD',  nome:'AMD',              icona:'cpu',          borsa:'NASDAQ' },
      { id:'RBLX', nome:'Roblox',           icona:'gamepad-2',    borsa:'NYSE' },
      { id:'WMT',  nome:'Walmart',          icona:'shopping-cart',   borsa:'NYSE' },
      { id:'TGT',  nome:'Target',           icona:'target',       borsa:'NYSE' },
      { id:'COST', nome:'Costco',           icona:'shopping-basket', borsa:'NASDAQ' },
      { id:'F',    nome:'Ford',             icona:'car',          borsa:'NYSE' },
      { id:'BA',   nome:'Boeing',           icona:'plane',        borsa:'NYSE' },
      { id:'DAL',  nome:'Delta Air Lines',  icona:'plane',        borsa:'NYSE' },
      { id:'EBAY', nome:'eBay',             icona:'shopping-cart',   borsa:'NASDAQ' },
      { id:'SHOP', nome:'Shopify',          icona:'shopping-bag', borsa:'NASDAQ' },
      { id:'SNAP', nome:'Snap',             icona:'camera',       borsa:'NYSE' },
      { id:'PINS', nome:'Pinterest',        icona:'image',        borsa:'NYSE' },
      { id:'ZM',   nome:'Zoom',             icona:'video',        borsa:'NASDAQ' },
      { id:'CROX', nome:'Crocs',            icona:'footprints',   borsa:'NASDAQ' },
      { id:'HAS',  nome:'Hasbro',           icona:'puzzle',       borsa:'NASDAQ' },
      { id:'MAT',  nome:'Mattel',           icona:'baby',         borsa:'NASDAQ' },
      { id:'RACE', nome:'Ferrari',          icona:'car',          borsa:'NYSE' },
      { id:'HOG',  nome:'Harley-Davidson',  icona:'bike',         borsa:'NYSE' },
    ];
    const IMPORTO_ACQUISTO = 2000; // ogni click su "Compra" investe questa cifra fissa

    // ====== Lo stato ======
    // Partono "vuoti": li riempie avvia() più sotto, con i progressi
    // salvati - lo stesso "magazzino" condiviso con dashboard.html e
    // profile.html (js/stato-gioco.js). "prezzi" arriva da lì: è la
    // mappa {ticker: prezzo} letta dalla tabella prezzi_mercato.
    let statoCompleto, liquidita, portafoglio, prezzi, profili;
    let idAperto = null;   // ticker aperto nel pannello di dettaglio, o null se chiuso

    function aziendaById(id){ return AZIENDE.find(a => a.id === id); }

    // La capitalizzazione è sempre un numero enorme (miliardi): la
    // scriviamo abbreviata, tipo "€ 3,45 Mrd", molto più leggibile
    // (eur() da solo arrotonderebbe via i decimali che qui servono).
    function formattaCap(n){
      if(n >= 1e9) return '€ ' + (n/1e9).toFixed(2).replace('.', ',') + ' Mrd';
      if(n >= 1e6) return '€ ' + (n/1e6).toFixed(0) + ' Mln';
      return eur(n);
    }

    function render(){
      $('tb-cash').textContent = eur(liquidita);
      $('liquidita-val').textContent = eur(liquidita);

      // Portafoglio: il valore vero è sempre quantità posseduta × prezzo di oggi.
      const posseduti = Object.keys(portafoglio);
      if(posseduti.length === 0){
        $('holding-grid').innerHTML = '<div class="holding-empty">Non possiedi ancora nessuna azione. Comprane una dal mercato qui sotto!</div>';
      } else {
        $('holding-grid').innerHTML = posseduti.map(id => {
          const a = aziendaById(id); const h = portafoglio[id];
          const prezzo = prezzi[id];
          const valore = prezzo ? h.quantita * prezzo : 0;
          return '<div class="holding" style="--acc:var(--br-stock)">'
            + '<div class="holding__top"><span class="holding__ic"><i data-lucide="' + a.icona + '"></i></span>'
            + '<div><div class="holding__nome">' + a.nome + '</div><div class="holding__tick">' + a.id + '</div></div></div>'
            + '<div class="holding__val">' + eur(valore) + '</div>'
            + '<div class="holding__delta">' + h.quantita.toFixed(2) + ' quote possedute</div>'
            + '<button class="btn btn--secondary" data-vendi="' + id + '">Vendi</button>'
            + '</div>';
        }).join('');
      }

      // Mercato: clic sulla card (o sul bottone) apre il pannello con
      // grafico e scheda azienda - "Compra" vero e proprio è lì dentro.
      $('market-grid').innerHTML = AZIENDE.map(a => {
        const prezzo = prezzi[a.id];
        return '<div class="market" data-dettagli="' + a.id + '" style="--acc:var(--br-stock)">'
          + '<div class="market__top"><span class="market__ic"><i data-lucide="' + a.icona + '"></i></span></div>'
          + '<div class="market__nome">' + a.nome + '</div>'
          + '<div class="market__tick">' + a.id + '</div>'
          + '<div class="market__prezzo">' + (prezzo ? eur(prezzo) : 'Prezzo non disponibile') + '</div>'
          + '<button class="btn btn--primary" data-dettagli="' + a.id + '">Scopri di più</button>'
          + '</div>';
      }).join('');

      lucide.createIcons();

      // Se il pannello di dettaglio è aperto, il bottone "Compra" dentro
      // deve restare coerente con la liquidità appena aggiornata.
      aggiornaBottoneCompraModal();
    }

    // Comprare, che sia dal pannello di dettaglio: importo fisso, quantità
    // comprata = importo / prezzo di oggi.
    function comprare(id){
      const prezzo = prezzi[id];
      if(!prezzo || liquidita < IMPORTO_ACQUISTO) return; // prezzo mancante o non abbastanza liquidità
      const quantitaComprata = IMPORTO_ACQUISTO / prezzo;
      liquidita -= IMPORTO_ACQUISTO;
      if(portafoglio[id]) portafoglio[id].quantita += quantitaComprata;
      else portafoglio[id] = { quantita: quantitaComprata };
      render();
      salvaStato(statoCorrente());
    }

    // Tiene il bottone "Compra" del pannello coerente con prezzo/liquidità
    // di oggi - anche se il pannello resta aperto dopo un acquisto.
    function aggiornaBottoneCompraModal(){
      if(!idAperto) return;
      const prezzo = prezzi[idAperto];
      const btn = $('mm-compra');
      btn.disabled = !prezzo || liquidita < IMPORTO_ACQUISTO;
      btn.textContent = 'Compra · ' + eur(IMPORTO_ACQUISTO);
    }

    // Apre il pannello di dettaglio: nome/prezzo, il grafico TradingView
    // (storico vero, nessuna chiave API nostra) e la scheda azienda coi
    // soli campi che ci sono davvero (vedi api/profili.js).
    function apriDettaglio(id){
      const a = aziendaById(id);
      const profilo = profili[id];
      idAperto = id;

      $('mm-ic').innerHTML = '<i data-lucide="' + a.icona + '"></i>';
      $('mm-nome').textContent = a.nome;
      $('mm-tick').textContent = a.id;
      $('mm-prezzo').textContent = prezzi[id] ? eur(prezzi[id]) : 'Prezzo non disponibile';

      const righe = [];
      if(profilo && profilo.settore) righe.push(['Settore', profilo.settore]);
      if(profilo && profilo.responsabile) righe.push(['CEO', profilo.responsabile]);
      if(profilo && profilo.capitalizzazione) righe.push(['Capitalizzazione', formattaCap(profilo.capitalizzazione)]);
      $('mm-scheda').innerHTML = righe.map(r => '<div class="mm-riga"><span>' + r[0] + '</span><b>' + r[1] + '</b></div>').join('');
      $('mm-curiosita').textContent = (profilo && profilo.curiosita) || '';
      $('mm-curiosita').style.display = (profilo && profilo.curiosita) ? '' : 'none';

      aggiornaBottoneCompraModal();

      // Il contenitore è condiviso tra tutti i titoli: si svuota e si
      // ricrea il grafico ogni volta, per il simbolo giusto.
      $('tv-grafico').innerHTML = '';
      new TradingView.widget({
        autosize: true,
        symbol: a.borsa + ':' + a.id,
        interval: 'D', timezone: 'Etc/UTC',
        theme: 'dark', style: '1', locale: 'it',
        toolbar_bg: '#131B28',
        enable_publishing: false,
        allow_symbol_change: false,
        hide_top_toolbar: true,
        container_id: 'tv-grafico',
      });

      $('market-modal').classList.add('on');
      lucide.createIcons();
    }

    function chiudiDettaglio(){
      idAperto = null;
      $('market-modal').classList.remove('on');
    }

    // Mette insieme lo stato attuale nella forma che salvaStato() si aspetta.
    // Si parte da statoCompleto (così restano anche settimana/XP/skin, che
    // questa pagina non tocca) e si aggiornano solo liquidità e azioni.
    function statoCorrente() {
      return { ...statoCompleto, cash: liquidita, azioni: portafoglio };
    }

    // ====== AVVIO: carica i progressi salvati, poi collega tutto ======
    async function avvia() {
      [statoCompleto, profili] = await Promise.all([caricaStato(), caricaProfiliTitoli()]);
      liquidita = statoCompleto.cash;
      portafoglio = statoCompleto.azioni;
      prezzi = statoCompleto.prezziMercato;

      // Ticker in alto: le stesse aziende del mercato, in scorrimento
      // continuo. Dipende dai prezzi veri, quindi va costruito qui
      // dentro, dopo che sono arrivati.
      const trackTicker = $('ticker-track');
      const voceTicker = a => '<span class="ticker__item"><span class="ticker__nome">' + a.id + '</span>'
        + '<span class="ticker__val">' + (prezzi[a.id] ? eur(prezzi[a.id]) : '—') + '</span></span>';
      trackTicker.innerHTML = AZIENDE.map(voceTicker).join('') + AZIENDE.map(voceTicker).join('');

      // ====== COLLEGAMENTI (solo ora che lo stato è pronto) ======

      // Click su una card (o sul suo bottone): apre il pannello di dettaglio.
      $('market-grid').addEventListener('click', e => {
        const el = e.target.closest('[data-dettagli]'); if(!el) return;
        apriDettaglio(el.dataset.dettagli);
      });

      // Il pannello di dettaglio: chiudi e compra.
      $('mm-chiudi').addEventListener('click', chiudiDettaglio);
      $('mm-compra').addEventListener('click', () => { if(!$('mm-compra').disabled) comprare(idAperto); });

      // Click su "Vendi": un click, vendi TUTTA la posizione al prezzo di oggi.
      $('holding-grid').addEventListener('click', e => {
        const btn = e.target.closest('[data-vendi]'); if(!btn) return;
        const id = btn.dataset.vendi;
        const prezzo = prezzi[id];
        if(!prezzo) return; // senza sapere il prezzo di oggi non possiamo vendere
        liquidita += portafoglio[id].quantita * prezzo;
        delete portafoglio[id];
        render();
        salvaStato(statoCorrente());
      });

      render();
    }

    avvia();
  </script>
</body>
</html>
