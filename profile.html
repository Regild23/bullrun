<!DOCTYPE html>
<!--
  ============================================================
  BullRun · Profilo del giocatore
  ============================================================
  Gestione profilo: username, email, la collezione di SKIN (le
  immagini del toro) e le scatole da aprire per vincerne di nuove.

  Come funzionano le skin:
  - All'iscrizione hai SOLO la skin "Classica" (quella del logo).
  - Tutte le altre sono bloccate: si sbloccano aprendo una scatola.
  - La foto profilo (l'avatar grande in alto) è semplicemente la
    skin che hai scelto di "equipaggiare" in quel momento.

  Per ora username, skin scelta e scatole si salvano nel browser
  (localStorage); l'email arriva da Supabase se hai fatto login.
-->
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BullRun · Il tuo profilo</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/site.css">
  <style>
    /* Barra in alto */
    .ptop { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 18px;
      padding: 14px 24px; background: var(--glass-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--br-line); }
    .ptop .back { display: inline-flex; align-items: center; gap: 6px; color: var(--br-text-muted); text-decoration: none; font-size: 14px; font-weight: 500; }
    .ptop .back:hover { color: var(--br-text); }
    .ptop .back svg.lucide { width: 16px; height: 16px; }
    .ptop .brand { display: flex; align-items: center; gap: 9px; }
    .ptop .brand img { height: 28px; filter: drop-shadow(0 0 10px rgba(37,228,212,0.35)); }
    .ptop .brand span { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--br-text); }

    .pwrap { max-width: 780px; margin: 0 auto; padding: 30px 24px 60px; display: flex; flex-direction: column; gap: 28px; }

    /* Carta profilo */
    .prof { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .prof__form { flex: 1; min-width: 260px; }
    .prof__form label { display: block; font-size: 13px; color: var(--br-text-muted); margin: 12px 0 6px; }
    .prof__form input { width: 100%; background: var(--br-surface-3); border: 1px solid var(--br-line); border-radius: var(--radius-md);
      padding: 11px 14px; color: var(--br-text); font-size: 15px; font-family: var(--font-body); }
    .prof__form input:focus { outline: none; border-color: var(--br-line-neon); box-shadow: 0 0 0 3px rgba(37,228,212,0.12); }
    .prof__email { background: var(--br-surface); border: 1px dashed var(--br-line); border-radius: var(--radius-md);
      padding: 11px 14px; font-family: var(--font-mono); font-size: 14px; color: var(--br-text-muted); }
    .prof__msg { margin-top: 10px; font-size: 13px; color: var(--br-up); min-height: 16px; }

    /* Avatar grande = foto profilo = skin equipaggiata */
    .av-big { position: relative; width: 108px; height: 108px; flex: none; }
    .av-big .ring { width: 108px; height: 108px; border-radius: 50%; padding: 4px; background: var(--br-gradient); box-shadow: var(--glow-soft-teal); }
    .av-big .face { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: var(--br-surface-3); border: 3px solid var(--br-bg); }
    .av-big .face img { width: 100%; height: 100%; object-fit: cover; }
    .av-big .lvl { position: absolute; right: 2px; bottom: 2px; min-width: 26px; height: 26px; padding: 0 6px; display: flex; align-items: center; justify-content: center;
      background: var(--br-bg); border: 2px solid var(--br-teal); color: var(--br-teal-bright); border-radius: var(--radius-pill);
      font-family: var(--font-mono); font-weight: 700; font-size: 12px; box-shadow: 0 0 10px rgba(37,228,212,0.4); }
    .av-big .xp { margin-top: 12px; }
    .av-big .xp .bar { height: 8px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.07); overflow: hidden; }
    .av-big .xp .bar > i { display: block; height: 100%; width: 74%; background: var(--br-gradient); box-shadow: 0 0 12px rgba(37,228,212,0.5); }
    .av-big .xp .t { font-family: var(--font-mono); font-size: 11px; color: var(--br-text-dim); margin-top: 5px; text-align: center; }

    /* Intestazioni di sezione (scatole / skin) */
    .sez__head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
    .sez__head h2 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--br-text); }
    .sez__head span { font-size: 13px; color: var(--br-text-dim); }

    /* Collezione skin */
    .skin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .skin { background: var(--br-surface); border: 1px solid var(--br-line); border-radius: var(--radius-lg); padding: 16px;
      display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; text-align: center;
      transition: transform var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out); }
    .skin:hover { transform: translateY(-3px); border-color: var(--br-line-strong); }
    .skin.equip { border-color: var(--br-teal); box-shadow: var(--glow-teal); }
    .skin.locked { cursor: not-allowed; }
    .skin__disc { position: relative; width: 58px; height: 58px; border-radius: 50%; overflow: hidden;
      background: var(--br-surface-3); border: 2px solid var(--br-bg); }
    .skin__disc img { width: 100%; height: 100%; object-fit: cover; }
    .skin.locked .skin__disc img { filter: grayscale(0.85) brightness(0.4); }
    .skin__lock { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--br-text); background: rgba(0,0,0,.25); }
    .skin__lock svg.lucide { width: 20px; height: 20px; }
    .skin__name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--br-text); }
    .skin__note { font-size: 11px; color: var(--br-text-dim); line-height: 1.3; }
    .skin__note.eq { color: var(--br-teal); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }

    /* Scatole da aprire */
    .box-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .box-card { background: var(--br-surface); border: 1px solid var(--br-line); border-radius: var(--radius-lg); padding: 18px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-align: center;
      transition: transform var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out); }
    .box-card:hover { transform: translateY(-3px); border-color: var(--br-line-neon); box-shadow: var(--glow-soft-teal); }
    .box-card__ic { width: 52px; height: 52px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
      background: var(--br-gradient-soft); color: var(--br-teal); }
    .box-card__ic svg.lucide { width: 28px; height: 28px; }
    .box-card__name { font-family: var(--font-display); font-weight: 600; font-size: 12.5px; color: var(--br-text); }
    .box-card__note { font-size: 10.5px; color: var(--br-text-dim); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .04em; }
    .box-empty { grid-column: 1/-1; text-align: center; padding: 26px 16px; color: var(--br-text-dim); font-size: 13.5px;
      background: var(--br-surface); border: 1px dashed var(--br-line); border-radius: var(--radius-lg); }

    /* Pannello apertura scatola */
    .box-modal { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center;
      background: rgba(6,8,13,.75); backdrop-filter: blur(6px); padding: 20px; }
    .box-modal.on { display: flex; }
    .box-modal__panel { position: relative; width: 100%; max-width: 380px; background: var(--br-surface);
      border: 1px solid var(--br-line-strong); border-radius: var(--radius-xl); padding: 40px 30px 32px; text-align: center;
      box-shadow: var(--shadow-lg); }
    .box-modal__close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%;
      background: var(--br-surface-2); border: 1px solid var(--br-line); color: var(--br-text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; }
    .box-modal__close svg.lucide { width: 17px; height: 17px; }
    .box-modal h3 { margin: 4px 0 6px; font-family: var(--font-display); font-size: 20px; color: var(--br-text); }
    .box-modal p.hint { margin: 0 0 22px; font-size: 13.5px; color: var(--br-text-muted); min-height: 18px; }

    /* Il "palco" ora mostra il video renderizzato in Blender (scatola nera
       con bordi neon che trema e si apre), invece di un'animazione CSS. */
    .box-stage { position: relative; width: 180px; height: 180px; margin: 0 auto 22px; display: flex;
      align-items: center; justify-content: center; border-radius: var(--radius-lg); background: var(--br-surface-2); overflow: hidden; }
    .box-stage video { width: 100%; height: 100%; object-fit: contain; }

    .box-reward { display: none; flex-direction: column; align-items: center; gap: 8px; margin: -6px 0 22px; animation: reveal-premio .45s var(--ease-bounce); }
    .box-reward.on { display: flex; }
    .box-reward img { width: 92px; height: 92px; border-radius: 50%; object-fit: cover; filter: drop-shadow(0 0 20px rgba(182,242,60,.5)); }
    .box-reward__tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--br-green); }
    .box-reward__name { font-family: var(--font-display); font-weight: 700; font-size: 19px; color: var(--br-text); }
    @keyframes reveal-premio { from { opacity: 0; transform: scale(.6); } to { opacity: 1; transform: scale(1); } }

    @media (max-width: 620px) {
      .skin-grid, .box-grid { grid-template-columns: 1fr 1fr; }
      .prof { justify-content: center; }
    }
  </style>
</head>
<body class="br-grid-bg">

  <header class="ptop">
    <a class="back" href="hub.html"><i data-lucide="arrow-left"></i> Cameretta</a>
    <div class="brand"><img src="assets/logo.png" alt=""><span>Il tuo profilo</span></div>
  </header>

  <main class="pwrap">

    <!-- Carta profilo -->
    <div class="card prof">
      <div class="av-big">
        <div class="ring"><div class="face"><img id="big-img" alt="La tua skin"></div></div>
        <span class="lvl">7</span>
        <div class="xp"><div class="bar"><i></i></div><div class="t">740 / 1000 XP</div></div>
      </div>
      <div class="prof__form">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Il tuo nome da giocatore" maxlength="20">
        <label>Email</label>
        <div class="prof__email" id="email">—</div>
        <button class="btn btn--primary" id="salva" style="margin-top:16px;">Salva profilo</button>
        <div class="prof__msg" id="msg"></div>
      </div>
    </div>

    <!-- Scatole da aprire -->
    <section>
      <div class="sez__head">
        <h2>Le tue scatole</h2>
        <span>Aprile per vincere nuove skin</span>
      </div>
      <div class="box-grid" id="box-grid"></div>
    </section>

    <!-- Collezione skin -->
    <section>
      <div class="sez__head">
        <h2>Le tue skin</h2>
        <span>Vincile aprendo le scatole</span>
      </div>
      <div class="skin-grid" id="skin-grid"></div>
    </section>

  </main>

  <!-- Pannello di apertura scatola -->
  <div class="box-modal" id="box-modal">
    <div class="box-modal__panel">
      <button class="box-modal__close" id="box-chiudi" aria-label="Chiudi"><i data-lucide="x"></i></button>
      <h3 id="box-titolo">Hai una scatola pronta!</h3>
      <p class="hint" id="box-hint">Toccala per scoprire cosa contiene.</p>
      <div class="box-stage" id="box-stage">
        <video id="box-video" src="assets/scatola/apertura.mp4" muted playsinline preload="auto"></video>
      </div>
      <div class="box-reward" id="box-reward">
        <img id="reward-img" src="" alt="">
        <span class="box-reward__tag">Skin sbloccata</span>
        <span class="box-reward__name" id="reward-nome"></span>
      </div>
      <button class="btn btn--primary btn--lg" id="box-apri" style="width:100%;">Apri ora</button>
      <button class="btn btn--primary btn--lg" id="box-continua" style="width:100%; display:none;">Fantastico!</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const $ = id => document.getElementById(id);

    // ===== Le skin (le immagini del toro) =====
    // All'iscrizione hai SOLO "Classica". Tutte le altre sono bloccate:
    // si sbloccano aprendo una scatola (vedi sezione scatole più sotto).
    const SKINS = [
      { id:'classica',   name:'Classica',    file:'bull-classica.png',   locked:false },
      { id:'fuoco',      name:'Fuoco',       file:'bull-fuoco.png',      locked:true },
      { id:'diamante',   name:'Diamante',    file:'bull-diamante.png',   locked:true },
      { id:'sayan',      name:'Super Sayan', file:'bull-sayan.png',      locked:true },
      { id:'occhiali',   name:'Nerd',        file:'bull-occhiali.png',   locked:true },
      { id:'girandola',  name:'Party',       file:'bull-girandola.png',  locked:true },
      { id:'pagliaccio', name:'Pagliaccio',  file:'bull-pagliaccio.png', locked:true },
      { id:'anni20',     name:'Anni 20',     file:'bull-anni20.png',     locked:true },
      { id:'pixar',      name:'Pastello',    file:'bull-pixar.png',      locked:true },
    ];

    // Le skin sbloccate aprendo scatole restano sbloccate anche dopo aver
    // ricaricato la pagina: le leggiamo dal browser e le applichiamo qui.
    try {
      const sbloccateSalvate = JSON.parse(localStorage.getItem('br_skin_sbloccate') || '[]');
      SKINS.forEach(s => { if (sbloccateSalvate.includes(s.id)) s.locked = false; });
    } catch (e) { /* niente di salvato, va bene così */ }

    function salvaSbloccate() {
      localStorage.setItem('br_skin_sbloccate', JSON.stringify(SKINS.filter(s => !s.locked).map(s => s.id)));
    }

    // Stato salvato nel browser
    let username = localStorage.getItem('br_username') || 'Giocatore';
    let equipped = localStorage.getItem('br_skin') || 'classica';
    // ⚠️ VALORE DI TEST: finché non esiste un vero modo di guadagnare le
    // scatole giocando, ne teniamo SEMPRE almeno 1 pronta, così si può
    // continuare a provare l'apertura. Da togliere quando ci sarà un vero
    // sistema (es. scatole vinte avanzando di settimana, per livello, ecc).
    let scatole = parseInt(localStorage.getItem('br_scatole') ?? '1', 10);
    if (scatole < 1) {
      scatole = 1;
      localStorage.setItem('br_scatole', scatole);
    }

    function skinById(id) { return SKINS.find(s => s.id === id) || SKINS[0]; }

    function render() {
      // Foto profilo = la skin equipaggiata
      const eq = skinById(equipped);
      $('big-img').src = 'assets/skin/' + eq.file;
      $('username').value = username;

      // Griglia skin
      $('skin-grid').innerHTML = SKINS.map(s => {
        const isEq = s.id === equipped;
        const note = s.locked ? 'Apri una scatola' : (isEq ? 'Equipaggiata' : 'Disponibile');
        return '<div class="skin' + (isEq ? ' equip' : '') + (s.locked ? ' locked' : '') + '" data-id="' + s.id + '">'
          + '<div class="skin__disc"><img src="assets/skin/' + s.file + '" alt="' + s.name + '">'
          + (s.locked ? '<span class="skin__lock"><i data-lucide="lock"></i></span>' : '') + '</div>'
          + '<div class="skin__name">' + s.name + '</div>'
          + '<div class="skin__note' + (isEq ? ' eq' : '') + '">' + note + '</div>'
          + '</div>';
      }).join('');

      renderScatole();
      lucide.createIcons();
    }

    function renderScatole() {
      const box = $('box-grid');
      if (scatole <= 0) {
        box.innerHTML = '<div class="box-empty">Non hai scatole da aprire. Continua a giocare per guadagnarne altre!</div>';
        return;
      }
      let html = '';
      for (let i = 0; i < scatole; i++) {
        html += '<button type="button" class="box-card" data-apri>'
          + '<span class="box-card__ic"><i data-lucide="package"></i></span>'
          + '<span class="box-card__name">Scatola Misteriosa</span>'
          + '<span class="box-card__note">Tocca per aprire</span>'
          + '</button>';
      }
      box.innerHTML = html;
      lucide.createIcons();
    }

    // Click su una skin: la equipaggi (se sbloccata) oppure ti dice come sbloccarla.
    $('skin-grid').addEventListener('click', e => {
      const el = e.target.closest('[data-id]'); if (!el) return;
      const s = skinById(el.dataset.id);
      if (s.locked) { mostra('Ancora bloccata — aprila con una scatola!', false); return; }
      equipped = s.id; localStorage.setItem('br_skin', equipped);
      render(); mostra('Skin "' + s.name + '" equipaggiata!', true);
    });

    // Salva username
    $('salva').addEventListener('click', () => {
      username = ($('username').value.trim() || 'Giocatore');
      localStorage.setItem('br_username', username);
      render(); mostra('Profilo salvato!', true);
    });

    let msgTimer;
    function mostra(t, ok) {
      const m = $('msg'); m.textContent = t; m.style.color = ok ? 'var(--br-up)' : 'var(--br-warn)';
      clearTimeout(msgTimer); msgTimer = setTimeout(() => { m.textContent = ''; }, 3000);
    }

    // Email dal login Supabase (se hai fatto accesso). Se non sei loggato
    // restiamo semplicemente su "—", senza chiederti di accedere qui.
    (async () => {
      try { const u = await utenteAttuale(); if (u && u.email) $('email').textContent = u.email; }
      catch (e) { /* nessun account collegato, va bene così */ }
    })();

    // ====== Apertura scatola: pannello + video (fatto in Blender) + premio ======
    const modal = $('box-modal');
    const video = $('box-video');

    $('box-grid').addEventListener('click', e => {
      if (e.target.closest('[data-apri]')) apriPannello();
    });
    $('box-chiudi').addEventListener('click', chiudiPannello);
    $('box-apri').addEventListener('click', apriScatolaOra);
    $('box-continua').addEventListener('click', () => { chiudiPannello(); render(); });

    function apriPannello() {
      video.pause();
      video.currentTime = 0; // torna al primo fotogramma: la scatola chiusa
      $('box-reward').classList.remove('on');
      $('box-titolo').textContent = 'Hai una scatola pronta!';
      $('box-hint').textContent = 'Toccala per scoprire cosa contiene.';
      $('box-apri').style.display = '';
      $('box-apri').textContent = 'Apri ora';
      $('box-apri').onclick = apriScatolaOra;
      $('box-continua').style.display = 'none';
      modal.classList.add('on');
    }

    function chiudiPannello() { modal.classList.remove('on'); video.pause(); }

    function apriScatolaOra() {
      $('box-apri').style.display = 'none';
      $('box-hint').textContent = '';
      video.currentTime = 0;
      video.play();

      // Aspettiamo che il video finisca (si apre da solo, la durata è quella
      // vera del filmato: niente numeri "a caso" da tenere allineati a mano).
      video.addEventListener('ended', mostraPremio, { once: true });
    }

    function mostraPremio() {
      const bloccate = SKINS.filter(s => s.locked);

      if (bloccate.length === 0) {
        // Le ha già sbloccate tutte: la scatola resta per un'altra volta.
        $('box-titolo').textContent = 'Le hai già tutte!';
        $('box-hint').textContent = 'Hai sbloccato tutte le skin. Questa scatola resta per la prossima volta.';
        $('box-apri').style.display = '';
        $('box-apri').textContent = 'Chiudi';
        $('box-apri').onclick = chiudiPannello;
        return;
      }

      const vinta = bloccate[Math.floor(Math.random() * bloccate.length)];
      vinta.locked = false;
      scatole = Math.max(0, scatole - 1);
      localStorage.setItem('br_scatole', scatole);
      salvaSbloccate();

      $('box-titolo').textContent = 'Scatola aperta!';
      $('reward-img').src = 'assets/skin/' + vinta.file;
      $('reward-nome').textContent = vinta.name;
      $('box-reward').classList.add('on');
      $('box-continua').style.display = '';
      lucide.createIcons();
    }

    render();
  </script>
</body>
</html>
