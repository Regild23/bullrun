<!DOCTYPE html>
<!--
  BullRun · Login / Iscrizione (collegata a Supabase)
  Stile del design system del brand. La logica di accesso è in js/supabase.js.
-->
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BullRun · Accedi</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/site.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px;
      background:
        radial-gradient(700px 420px at 18% 0%, rgba(182,242,60,0.10), transparent 62%),
        radial-gradient(700px 420px at 100% 100%, rgba(37,228,212,0.12), transparent 58%),
        var(--br-bg); }
    .auth { width: 100%; max-width: 420px; }
    .auth__logo { display: flex; align-items: center; justify-content: center; gap: 11px; margin-bottom: 6px; }
    .auth__logo img { height: 44px; filter: drop-shadow(0 0 12px rgba(37,228,212,0.4)); }
    .auth__logo span { font-family: var(--font-display); font-weight: 700; font-size: 24px; letter-spacing: -0.02em; color: var(--br-text); }
    .auth__sub { text-align: center; color: var(--br-text-muted); font-size: 14px; margin-bottom: 22px; }

    .auth__tabs { display: flex; background: var(--br-surface); border: 1px solid var(--br-line); border-radius: var(--radius-pill); padding: 4px; margin-bottom: 20px; }
    .auth__tabs button { flex: 1; padding: 10px; border: none; background: transparent; color: var(--br-text-muted);
      font-family: var(--font-display); font-weight: 600; font-size: 14px; border-radius: var(--radius-pill); cursor: pointer; transition: .2s; }
    .auth__tabs button.on { background: var(--br-gradient); color: var(--br-ink); box-shadow: var(--glow-soft-teal); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: var(--br-text-muted); margin-bottom: 6px; }
    .field input { width: 100%; background: var(--br-surface-3); border: 1px solid var(--br-line); border-radius: var(--radius-md);
      padding: 12px 14px; color: var(--br-text); font-size: 15px; font-family: var(--font-body); }
    .field input:focus { outline: none; border-color: var(--br-line-neon); box-shadow: 0 0 0 3px rgba(37,228,212,0.12); }

    .divider { text-align: center; color: var(--br-text-dim); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin: 18px 0; position: relative; }
    .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--br-line); }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .btn-google { width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--br-surface-2); color: var(--br-text); border: 1px solid var(--br-line-strong); border-radius: var(--radius-md);
      padding: 13px; font-family: var(--font-display); font-weight: 600; font-size: 15px; cursor: pointer; transition: .2s; }
    .btn-google:hover { background: var(--br-surface-3); }
    .btn-google svg.lucide { width: 18px; height: 18px; color: var(--br-teal); }

    .auth__msg { margin-top: 16px; text-align: center; font-size: 14px; min-height: 20px; line-height: 1.4; }
    .auth__msg.ok { color: var(--br-up); } .auth__msg.err { color: var(--br-down); }
    .auth__back { display: block; text-align: center; margin-top: 18px; color: var(--br-text-dim); font-size: 13px; text-decoration: none; }
    .auth__back:hover { color: var(--br-text-muted); }
  </style>
</head>
<body class="br-grid-bg">
  <div class="auth">
    <div class="card" style="padding:30px;">
      <div class="auth__logo">
        <img src="assets/logo.png" alt="">
        <span><span class="br-gradient-text">Bull</span>Run</span>
      </div>
      <p class="auth__sub">Entra e ricevi €10.000 virtuali da investire.</p>

      <div class="auth__tabs">
        <button id="tab-accedi" class="on">Accedi</button>
        <button id="tab-iscriviti">Iscriviti</button>
      </div>

      <form id="form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="latua@email.it" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="almeno 6 caratteri" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary btn--lg" id="btn-invia" style="width:100%;">Accedi</button>
      </form>

      <div class="divider">oppure</div>
      <button class="btn-google" id="btn-google"><i data-lucide="chrome"></i> Continua con Google</button>

      <div class="auth__msg" id="msg"></div>
      <a class="auth__back" href="index.html">← Torna alla home</a>
    </div>
  </div>

  <!-- Libreria di Supabase + nostro collegamento -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    const msg = document.getElementById("msg");
    const btnInvia = document.getElementById("btn-invia");
    let modo = "accedi";

    function mostra(testo, tipo){ msg.textContent = testo; msg.className = "auth__msg " + (tipo || ""); }

    function traduci(err){
      if(!err) return "Qualcosa è andato storto.";
      if(err.includes("Invalid login credentials")) return "Email o password non corretti.";
      if(err.includes("already registered")) return "Questa email è già registrata. Prova ad accedere.";
      if(err.includes("Password should be")) return "La password deve avere almeno 6 caratteri.";
      if(err.includes("not enabled") || err.includes("Unsupported provider")) return "Questo metodo non è ancora attivo.";
      return err;
    }

    function setModo(m){
      modo = m;
      document.getElementById("tab-accedi").classList.toggle("on", m === "accedi");
      document.getElementById("tab-iscriviti").classList.toggle("on", m === "iscriviti");
      btnInvia.textContent = (m === "accedi") ? "Accedi" : "Crea account";
      mostra("");
    }
    document.getElementById("tab-accedi").onclick = () => setModo("accedi");
    document.getElementById("tab-iscriviti").onclick = () => setModo("iscriviti");

    document.getElementById("form").onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const pw = document.getElementById("password").value;
      if(!email || !pw){ mostra("Scrivi email e password.", "err"); return; }

      mostra("Un attimo…");
      let res;
      if(modo === "iscriviti") res = await registratiConEmail(email, pw);
      else res = await accediConEmail(email, pw);

      if(res.error){ mostra("❌ " + traduci(res.error.message), "err"); return; }

      if(modo === "iscriviti"){
        if(res.data && res.data.user && !res.data.session){
          mostra("✅ Iscrizione fatta! Controlla la tua email per confermare, poi accedi.", "ok");
        } else {
          mostra("✅ Account creato! Entro nel gioco…", "ok");
          setTimeout(() => location.href = "hub.html", 1000);
        }
      } else {
        mostra("✅ Accesso riuscito! Entro nel gioco…", "ok");
        setTimeout(() => location.href = "hub.html", 800);
      }
    };

    document.getElementById("btn-google").onclick = async () => {
      mostra("Apro Google…");
      const res = await accediConGoogle();
      if(res && res.error) mostra("⚠️ Google non è ancora attivo. Per ora usa l'email.", "err");
    };

    (async () => {
      const u = await utenteAttuale();
      if(u) mostra("Sei già dentro come " + u.email + ".", "ok");
    })();
  </script>
</body>
</html>
