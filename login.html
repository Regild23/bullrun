<!DOCTYPE html>
<!--
  BullRun · Pagina di Login / Iscrizione (collegata a Supabase)
  Stile provvisorio (GameFi), da rifinire col design definitivo.
-->
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BullRun · Accedi</title>
<style>
  :root{
    --bg:#070b16; --panel:rgba(20,28,50,.6); --panel-2:rgba(12,18,36,.6);
    --border:rgba(120,160,255,.18); --text:#eaf0ff; --muted:#8ea0c8;
    --cyan:#34e3ff; --lime:#9bf06b; --violet:#a875ff;
    --ok:#9bf06b; --err:#ff6b8a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;
    display:grid;place-items:center;padding:24px;
    background:
      radial-gradient(700px 400px at 20% 0%, rgba(91,140,255,.20), transparent 60%),
      radial-gradient(700px 400px at 100% 100%, rgba(168,117,255,.18), transparent 55%),
      var(--bg);}
  .card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);
    border-radius:22px;padding:30px;backdrop-filter:blur(12px);
    box-shadow:0 30px 90px -40px rgba(52,227,255,.5)}
  .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .logo .mark{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:22px;
    background:linear-gradient(135deg,var(--lime),var(--cyan));box-shadow:0 0 18px rgba(52,227,255,.5)}
  .logo h1{font-size:22px;letter-spacing:2px;font-weight:800}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px}

  /* Linguette Accedi / Iscriviti */
  .tabs{display:flex;background:var(--panel-2);border:1px solid var(--border);border-radius:12px;
    padding:4px;margin-bottom:20px}
  .tabs button{flex:1;background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;
    padding:10px;border-radius:9px;cursor:pointer;transition:.2s}
  .tabs button.active{background:linear-gradient(135deg,var(--lime),var(--cyan));color:#04210f}

  label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;color:var(--text);font-size:15px}
  input:focus{outline:none;border-color:var(--cyan)}

  .btn{width:100%;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;
    cursor:pointer;margin-top:20px;transition:transform .12s,box-shadow .25s}
  .btn-primary{background:linear-gradient(135deg,var(--lime),var(--cyan));color:#04210f;
    box-shadow:0 0 24px rgba(155,240,107,.4)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 34px rgba(52,227,255,.6)}

  .oppure{text-align:center;color:var(--muted);font-size:12px;margin:18px 0;position:relative}
  .oppure::before,.oppure::after{content:"";position:absolute;top:50%;width:38%;height:1px;background:var(--border)}
  .oppure::before{left:0}.oppure::after{right:0}

  .btn-google{width:100%;background:#fff;color:#1f2330;border:none;border-radius:11px;padding:13px;
    font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
  .btn-google:hover{opacity:.92}

  .msg{margin-top:18px;font-size:14px;text-align:center;min-height:20px;line-height:1.4}
  .msg.ok{color:var(--ok)} .msg.err{color:var(--err)}
  .back{display:block;text-align:center;margin-top:18px;color:var(--muted);font-size:13px;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="mark">🐂</span><h1>BULLRUN</h1></div>
    <p class="sub">Entra e ricevi €10.000 virtuali da investire.</p>

    <div class="tabs">
      <button id="tab-accedi" class="active">Accedi</button>
      <button id="tab-iscriviti">Iscriviti</button>
    </div>

    <form id="form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="latua@email.it" autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="almeno 6 caratteri" autocomplete="current-password">
      <button type="submit" class="btn btn-primary" id="btn-invia">Accedi</button>
    </form>

    <div class="oppure">oppure</div>
    <button class="btn-google" id="btn-google">
      <span>🔵</span> Continua con Google
    </button>

    <div class="msg" id="msg"></div>
    <a class="back" href="mockup/landing.html">← Torna alla home</a>
  </div>

  <!-- Libreria di Supabase + nostro collegamento -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    const msg = document.getElementById("msg");
    const btnInvia = document.getElementById("btn-invia");
    let modo = "accedi";

    function mostra(testo, tipo){ msg.textContent = testo; msg.className = "msg " + (tipo || ""); }

    // Traduce in italiano gli errori più comuni di Supabase.
    function traduci(err){
      if(!err) return "Qualcosa è andato storto.";
      if(err.includes("Invalid login credentials")) return "Email o password non corretti.";
      if(err.includes("already registered")) return "Questa email è già registrata. Prova ad accedere.";
      if(err.includes("Password should be")) return "La password deve avere almeno 6 caratteri.";
      if(err.includes("not enabled") || err.includes("Unsupported provider")) return "Questo metodo non è ancora attivo.";
      return err;
    }

    // Cambia tra "Accedi" e "Iscriviti".
    function setModo(m){
      modo = m;
      document.getElementById("tab-accedi").classList.toggle("active", m === "accedi");
      document.getElementById("tab-iscriviti").classList.toggle("active", m === "iscriviti");
      btnInvia.textContent = (m === "accedi") ? "Accedi" : "Crea account";
      mostra("");
    }
    document.getElementById("tab-accedi").onclick = () => setModo("accedi");
    document.getElementById("tab-iscriviti").onclick = () => setModo("iscriviti");

    // Invio del modulo email/password.
    document.getElementById("form").onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const pw = document.getElementById("password").value;
      if(!email || !pw){ mostra("Scrivi email e password.", "err"); return; }

      mostra("Un attimo… ⏳");
      let res;
      if(modo === "iscriviti") res = await registratiConEmail(email, pw);
      else res = await accediConEmail(email, pw);

      if(res.error){ mostra("❌ " + traduci(res.error.message), "err"); return; }

      if(modo === "iscriviti"){
        // Se Supabase chiede la conferma via email, non c'è ancora una sessione.
        if(res.data && res.data.user && !res.data.session){
          mostra("✅ Iscrizione fatta! Controlla la tua email per confermare, poi accedi.", "ok");
        } else {
          mostra("✅ Account creato! Entro nel gioco…", "ok");
          setTimeout(() => location.href = "index.html", 1000);
        }
      } else {
        mostra("✅ Accesso riuscito! Entro nel gioco…", "ok");
        setTimeout(() => location.href = "index.html", 800);
      }
    };

    // Bottone Google (per ora avvisa se non è ancora attivo).
    document.getElementById("btn-google").onclick = async () => {
      mostra("Apro Google… ⏳");
      const res = await accediConGoogle();
      if(res && res.error) mostra("⚠️ Google non è ancora attivo. Per ora usa l'email.", "err");
    };

    // Se sei già loggato, lo diciamo subito.
    (async () => {
      const u = await utenteAttuale();
      if(u) mostra("Sei già dentro come " + u.email + ".", "ok");
    })();
  </script>
</body>
</html>
